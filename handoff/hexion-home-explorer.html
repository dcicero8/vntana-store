<!doctype html>
<!--
  Hexion Home Product Explorer — self-contained embed for the web team.

  WHAT THIS IS
  A VNTANA 3D viewer with clickable hotspots and an Exterior/Interior switch.
  Everything is in this one file: markup, CSS, and JS. No build step, no
  framework, no external stylesheet.

  WHAT YOU NEED
  1) The VNTANA viewer (one dependency). This file loads it from the CDN:
       <script type="module" src="https://cdn.jsdelivr.net/npm/@vntana/viewer/dist/bundle.js"></script>
     Or install via npm instead:  npm i @vntana/viewer   then   import '@vntana/viewer';
  2) The CONFIG object below (org/workspace slugs + product UUIDs). Edit those to
     point at different assets.
  3) This custom code (the CSS block + the <script> at the bottom).

  TO EMBED IN YOUR PAGE
  Drop the <div class="hx-explorer"> ... </div> where you want it, include the
  viewer <script> once, and include the CSS + the module <script>. The explorer
  fills its container; set .hx-explorer { height } to size it (defaults to 100vh).

  NOTES
  - All API calls are read-only and unauthenticated (the assets are public), so
    no keys or tokens are needed.
  - Styles are scoped under .hx-explorer so they won't affect the rest of your site.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hexion Home Product Explorer</title>
  <style>
    /* ── Container (size this to taste) ───────────────────────── */
    .hx-explorer {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #f5f4f2;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .hx-explorer vntana-viewer { width: 100%; height: 100%; display: block; }

    /* ── Exterior / Interior switch (floating, top-left) ──────── */
    .hx-view-switcher {
      position: absolute; top: 16px; left: 16px; z-index: 10;
      display: flex; border: 1.5px solid #e2e2e0; border-radius: 8px;
      overflow: hidden; background: #f5f5f5;
    }
    .hx-view-switcher button {
      padding: 0.4rem 1.1rem; border: none; background: transparent;
      font: 600 0.8rem/1 inherit; color: #6b6b6b; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .hx-view-switcher button + button { border-left: 1.5px solid #e2e2e0; }
    .hx-view-switcher button.active { background: #111; color: #fff; }
    .hx-view-switcher button:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Viewer built-in buttons ──────────────────────────────── */
    .hx-explorer .button-container {
      display: flex; align-items: center; gap: 1px; box-sizing: border-box;
      box-shadow: 0 0 20px 0 rgba(0,0,0,.15); border-radius: 5px;
      background: #cdcdcd; overflow: hidden;
    }
    .hx-explorer .button-container * { flex: 0 1 auto; position: static; box-shadow: none; border-radius: 0; }
    .hx-explorer vntana-center-button { position: absolute; top: 19px; right: 19px; z-index: 1; }
    .hx-explorer vntana-fs-button     { position: absolute; right: 19px; bottom: 25px; z-index: 2; }
    .hx-explorer .zoom-buttons        { position: absolute; right: 19px; bottom: 85px; z-index: 3; flex-direction: column; }

    /* ── Hotspot pins: grey, numbered, no pulse ───────────────── */
    .hx-explorer vntana-hotspot { position: relative; }
    .hx-explorer .hotspot-pin {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 50%;
      background: #6b7280; color: #fff; font-size: .72rem; font-weight: 700;
      border: 2px solid #fff; box-shadow: 0 1px 5px rgba(0,0,0,.35);
      transition: transform .15s, background .15s, box-shadow .15s;
    }
    .hx-explorer vntana-hotspot:hover .hotspot-pin {
      background: #4b5563; transform: scale(1.12); box-shadow: 0 2px 9px rgba(0,0,0,.45);
    }
    .hx-explorer vntana-hotspot.open .hotspot-pin { background: #111; box-shadow: 0 2px 9px rgba(0,0,0,.5); }
    /* A pin that would sit on top of the open card fades out */
    .hx-explorer .hotspot-pin.behind-card { opacity: .12; pointer-events: none; }

    /* ── Hotspot card ─────────────────────────────────────────── */
    .hx-explorer .hotspot-popup {
      display: none;
      position: absolute;
      width: 540px; max-width: 540px;
      right: calc(100% + 12px); left: auto; top: 50%; bottom: auto;
      transform: translate(var(--cardShift, 0px), -50%);  /* JS clamps into viewport */
      background: #fff; border: 1px solid #e2e2e0; border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,.18); padding: 20px; z-index: 9999;
    }
    .hx-explorer vntana-hotspot.open .hotspot-popup { display: block; }
    /* placement variants set by JS: right of pin, or below / above (centered) */
    .hx-explorer vntana-hotspot.flip-right .hotspot-popup { right: auto; left: calc(100% + 12px); }
    .hx-explorer vntana-hotspot.place-below .hotspot-popup {
      right: auto; left: 50%; top: calc(100% + 14px); bottom: auto;
      transform: translate(calc(-50% + var(--cardShift, 0px)), 0);
    }
    .hx-explorer vntana-hotspot.place-above .hotspot-popup {
      right: auto; left: 50%; top: auto; bottom: calc(100% + 14px);
      transform: translate(calc(-50% + var(--cardShift, 0px)), 0);
    }
    .hx-explorer .hotspot-popup-body { display: flex; gap: 16px; align-items: flex-start; }
    .hx-explorer .hotspot-popup img {
      width: 170px; height: 170px; object-fit: cover; border-radius: 8px; flex-shrink: 0; margin: 0;
    }
    .hx-explorer .hotspot-text { min-width: 0; }
    .hx-explorer .hotspot-text strong { font-size: .95rem; font-weight: 700; color: #111; display: block; line-height: 1.3; }
    .hx-explorer .hotspot-text p { font-size: .82rem; color: #555; margin-top: .5rem; line-height: 1.5; }
    .hx-explorer .hotspot-close {
      position: absolute; top: 4px; right: 6px; background: none; border: none;
      cursor: pointer; font-size: .72rem; color: #6b6b6b; padding: 2px 4px; line-height: 1; z-index: 1;
    }
    .hx-explorer .hotspot-close:hover { color: #111; }
  </style>
</head>
<body style="margin:0">

  <!-- ── Drop this block where you want the explorer ──────────── -->
  <div class="hx-explorer">
    <div class="hx-view-switcher">
      <button class="active" data-view="exterior">Exterior</button>
      <button data-view="interior">Interior</button>
    </div>
    <vntana-viewer id="hx-viewer" loading="eager" role="application" aria-label="Hexion Home 3D explorer">
      <vntana-fs-button></vntana-fs-button>
      <vntana-center-button></vntana-center-button>
      <div class="button-container zoom-buttons">
        <vntana-zoom-in-button></vntana-zoom-in-button>
        <vntana-zoom-out-button></vntana-zoom-out-button>
      </div>
    </vntana-viewer>
  </div>

  <!-- VNTANA viewer (the one dependency) -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@vntana/viewer/dist/bundle.js"></script>

  <!-- Explorer logic -->
  <script type="module">
    // ── CONFIG: edit these to point at different assets ──────────
    const CONFIG = {
      apiBase: "https://api.vntana.com",
      org: "hexion",
      workspace: "demo-room",
      views: {
        exterior: "39f54c5d-6a80-4337-b974-c5e0d2dcc8da",
        interior: "b86d5716-d564-481b-bea3-5e7aa0446449",
      },
    };

    const { apiBase: BASE, org: ORG, workspace: WS, views: VIEWS } = CONFIG;
    const viewer = document.getElementById("hx-viewer");
    let activeView = "exterior";

    const stripHtml = html => { const d = document.createElement("div"); d.innerHTML = html; return d.textContent.trim(); };

    function snapCamera(cam) {
      if (!cam) return;
      try {
        if (cam.cameraRotation)   viewer.setCameraRotation(cam.cameraRotation);
        if (cam.cameraDistance)   viewer.setCameraDistance(cam.cameraDistance);
        if (cam.cameraTarget)     viewer.setCameraTarget(cam.cameraTarget);
        if (cam.fieldOfView)      viewer.setFieldOfView(cam.fieldOfView);
        if (cam.orthographicSize) viewer.setOrthographicSize(cam.orthographicSize);
      } catch (e) {}
    }

    const closeAll = () => {
      viewer.querySelectorAll("vntana-hotspot.open").forEach(h => {
        h.classList.remove("open", "flip-right", "place-below", "place-above");
        delete h.dataset.place;
        h.querySelector(".hotspot-popup")?.style.removeProperty("--cardShift");
      });
      watchOverlaps();
    };

    // While a card is open: (1) place it on the roomy side of the pin, dropping it
    // below/above the pin when neither side fits (so it never covers its own pin),
    // (2) clamp it inside the viewport, (3) fade any pin that would overlap it.
    // Runs per-frame so it tracks the camera; a handful of pins is cheap.
    let overlapRaf = null;
    function watchOverlaps() {
      cancelAnimationFrame(overlapRaf);
      viewer.querySelectorAll(".hotspot-pin.behind-card").forEach(p => p.classList.remove("behind-card"));
      const open = viewer.querySelector("vntana-hotspot.open");
      if (!open) return;
      const step = () => {
        if (!open.classList.contains("open")) return;
        const CARD_W = 560; // 540 card + gap
        const vr = viewer.getBoundingClientRect();
        const cardEl = open.querySelector(".hotspot-popup");
        const pr = open.querySelector(".hotspot-pin")?.getBoundingClientRect();
        if (pr && vr.width && cardEl) {
          const spaceLeft = pr.left - vr.left, spaceRight = vr.right - pr.right;
          let place = "left";
          if (spaceLeft < CARD_W) place = (spaceRight >= CARD_W) ? "right" : "vertical";
          if (place === "vertical") place = ((vr.bottom - pr.bottom) >= (pr.top - vr.top)) ? "below" : "above";
          if (open.dataset.place !== place) {
            open.dataset.place = place;
            open.classList.toggle("flip-right",  place === "right");
            open.classList.toggle("place-below", place === "below");
            open.classList.toggle("place-above", place === "above");
            cardEl.style.removeProperty("--cardShift");
          }
          // clamp horizontally into the viewport
          const cur = parseFloat(cardEl.style.getPropertyValue("--cardShift")) || 0;
          const c = cardEl.getBoundingClientRect(), M = 10;
          let desired = cur;
          if (c.left < vr.left + M)        desired = cur + (vr.left + M - c.left);
          else if (c.right > vr.right - M) desired = cur + (vr.right - M - c.right);
          if (Math.abs(desired - cur) > 0.5) cardEl.style.setProperty("--cardShift", desired + "px");
        }
        const card = cardEl?.getBoundingClientRect();
        if (card && card.width) {
          viewer.querySelectorAll("vntana-hotspot:not(.open) .hotspot-pin").forEach(pin => {
            const r = pin.getBoundingClientRect();
            const hit = r.left < card.right && r.right > card.left && r.top < card.bottom && r.bottom > card.top;
            pin.classList.toggle("behind-card", hit);
          });
        }
        overlapRaf = requestAnimationFrame(step);
      };
      step();
    }

    function injectHotspots(grid, uuid) {
      viewer.querySelectorAll("vntana-hotspot").forEach(h => h.remove());
      grid.forEach((hs, idx) => {
        const dims   = JSON.parse(hs.config.dimensions);
        const camera = hs.config.camera ? JSON.parse(hs.config.camera) : null;

        const rawHtml = hs.description ?? hs.text ?? "";
        const d0 = document.createElement("div"); d0.innerHTML = rawHtml;
        const boldEl = d0.querySelector("strong, b");
        const title  = boldEl ? boldEl.textContent.trim() : (stripHtml(rawHtml).split("\n")[0] || `Stop ${idx + 1}`);
        if (boldEl) boldEl.remove();
        const desc = d0.textContent.trim();

        const imgUrl = hs.blobId
          ? `${BASE}/hotspots/images/products/${uuid}/organizations/${ORG}/clients/${WS}/${hs.blobId}`
          : null;

        const el = document.createElement("vntana-hotspot");
        el.position = dims.position;
        el.normal   = dims.normal;
        el.innerHTML = `
          <span class="hotspot-pin">${idx + 1}</span>
          <div class="hotspot-popup">
            <button class="hotspot-close" aria-label="Close">✕</button>
            <div class="hotspot-popup-body">
              ${imgUrl ? `<img src="${imgUrl}" alt="" onerror="this.style.display='none'">` : ""}
              <div class="hotspot-text">
                <strong>${title}</strong>
                ${desc ? `<p>${desc}</p>` : ""}
              </div>
            </div>
          </div>`;

        el.addEventListener("click", e => {
          if (e.target.closest(".hotspot-popup")) return;
          const isOpen = el.classList.contains("open");
          closeAll();
          if (!isOpen) { el.classList.add("open"); snapCamera(camera); watchOverlaps(); }
        });
        el.querySelector(".hotspot-close").addEventListener("click", closeAll);
        viewer.appendChild(el);
      });
    }

    async function loadView(viewKey) {
      const uuid = VIEWS[viewKey];
      document.querySelectorAll(".hx-view-switcher button").forEach(b => b.disabled = true);
      closeAll();
      viewer.querySelectorAll("vntana-hotspot").forEach(h => h.remove());
      try {
        const [product, hsData] = await Promise.all([
          fetch(`${BASE}/products/${uuid}/organizations/${ORG}/clients/${WS}`).then(r => r.json()),
          fetch(`${BASE}/hotspots/search/organizations/${ORG}/clients/${WS}`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ productUuid: uuid, page: 1, size: 100 })
          }).then(r => r.json())
        ]);
        const config = JSON.parse(product.response.viewerSettings.config);
        Object.assign(viewer, config);
        const glb = product.response.asset.models.find(m => (m.conversionFormat ?? m.type) === "GLB");
        const blobId = glb?.modelBlobId ?? glb?.blobId;
        const grid = hsData.response?.grid ?? [];
        viewer.addEventListener("load", () => {
          injectHotspots(grid, uuid);
          document.querySelectorAll(".hx-view-switcher button").forEach(b => b.disabled = false);
        }, { once: true });
        if (blobId) viewer.src = `${BASE}/assets/products/${uuid}/organizations/${ORG}/clients/${WS}/${blobId}`;
      } catch (err) {
        console.error("Explorer: failed to load view", viewKey, err);
        document.querySelectorAll(".hx-view-switcher button").forEach(b => b.disabled = false);
      }
    }

    // Close the open card when clicking empty space (registered ONCE).
    viewer.addEventListener("click", e => { if (!e.target.closest("vntana-hotspot")) closeAll(); });

    document.querySelectorAll(".hx-view-switcher button").forEach(btn => {
      btn.addEventListener("click", async () => {
        const view = btn.dataset.view;
        if (view === activeView) return;
        activeView = view;
        document.querySelectorAll(".hx-view-switcher button").forEach(b => b.classList.toggle("active", b.dataset.view === view));
        await loadView(view);
      });
    });

    await loadView("exterior");
  </script>

</body>
</html>
