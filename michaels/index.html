<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Michaels Demo | VNTANA.com</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="preload" as="image" href="test-images/Horizontal.jpg"/>
  <link rel="preload" as="image" href="test-images/Vertical.jpg"/>
  <link rel="preload" as="image" href="test-images/Panoramic.jpg"/>
  <link rel="preload" as="image" href="test-images/DigitalFlow3.avif"/>

  <style>
    .landing {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
    }

    .landing a {
      width: 160px;
      height: 160px;
      border: 2px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #777;
      text-decoration: none;
      user-select: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .landing a:hover {
      border-color: #2e4557;
      color: #2e4557;
    }

    .landing a:hover svg {
      stroke: #2e4557;
    }

    .landing a svg {
      width: 36px;
      height: 36px;
      stroke: #999;
      transition: stroke 0.15s;
    }
  </style>
</head>

<body>
  <div class="landing">
    <a href="index-custom-frame.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round">
        <!-- wrench/settings icon for "custom" -->
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94L6.73 20.15a2.1 2.1 0 0 1-3-3l6.72-6.72a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      Custom Frames
    </a>
    <a href="index-ready-made-frame.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round">
        <!-- framed picture icon -->
        <rect x="2" y="2" width="20" height="20" rx="2"/>
        <rect x="5" y="5" width="14" height="14" rx="1"/>
        <circle cx="12" cy="10" r="2"/>
        <polyline points="19 19 15 13 9 17 5 19"/>
      </svg>
      Ready Made Frames
    </a>
  </div>
</body>
</html>
