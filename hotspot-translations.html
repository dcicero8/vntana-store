<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hotspot Translation Test — Internal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Internal badge ── */
    .internal-banner {
      background: #fef3c7;
      border-bottom: 1px solid #fcd34d;
      padding: 0.4rem 1.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #92400e;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .internal-banner::before {
      content: "⚙";
      font-size: 0.9rem;
    }

    .page-wrap {
      display: grid;
      grid-template-columns: 1fr 420px;
      min-height: calc(100vh - var(--header-h) - 32px);
    }

    /* ── Viewer column ── */
    .viewer-col {
      position: sticky;
      top: calc(var(--header-h) + 32px);
      height: calc(100vh - var(--header-h) - 32px);
      background: #f5f4f2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .viewer-wrap {
      position: relative;
      flex: 1;
    }

    vntana-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Right panel ── */
    .panel {
      background: #fff;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-section {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .panel-section:last-child { border-bottom: none; }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    /* ── Language picker ── */
    .lang-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .lang-btn {
      padding: 0.35rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .lang-btn:hover { border-color: #aaa; color: var(--text); }
    .lang-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .lang-btn.missing {
      border-style: dashed;
      opacity: 0.55;
    }

    /* ── Hotspot cards ── */
    .hotspot-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
    }

    .hs-card {
      display: flex;
      gap: 0.75rem;
      padding: 0.875rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fafafa;
      margin-bottom: 0.6rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .hs-card.active {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .hs-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #e5e7eb;
      color: #6b7280;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: background 0.2s, color 0.2s;
    }
    .hs-card.active .hs-num { background: #2563eb; color: #fff; }

    .hs-card-img {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .hs-text strong {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      display: block;
    }
    .hs-text .hs-desc {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.45;
      margin-top: 0.2rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hs-text .hs-missing {
      font-size: 0.72rem;
      color: #ef4444;
      font-style: italic;
    }

    /* ── Translation JSON editor ── */
    .json-panel {
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .json-panel-head {
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .json-panel-head:hover { background: #f9f9f9; }
    .json-toggle-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .json-toggle-icon { font-size: 0.75rem; color: var(--muted); transition: transform 0.2s; }
    .json-toggle-icon.open { transform: rotate(180deg); }

    .json-body {
      display: none;
      padding: 0 1.5rem 1.25rem;
    }
    .json-body.open { display: block; }

    .json-area {
      width: 100%;
      height: 160px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.72rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem;
      resize: vertical;
      color: var(--text);
      background: #f8f8f8;
      line-height: 1.5;
    }
    .json-area:focus { outline: none; border-color: #2563eb; }

    .json-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .json-btn {
      flex: 1;
      padding: 0.45rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: var(--text);
      transition: background 0.15s;
    }
    .json-btn:hover { background: #f5f5f5; }
    .json-btn.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .json-btn.primary:hover { background: #1d4ed8; }

    .json-status {
      font-size: 0.72rem;
      margin-top: 0.4rem;
      min-height: 1rem;
    }
    .json-status.ok { color: #16a34a; }
    .json-status.err { color: #dc2626; }

    @media (max-width: 860px) {
      .page-wrap { grid-template-columns: 1fr; }
      .viewer-col { position: relative; top: 0; height: 65vw; min-height: 300px; }
    }
  </style>
</head>
<body>

  <div class="internal-banner">Internal Tool — Hotspot Translation Testing</div>

  <header>
    <a href="index.html" class="logo"><img src="VNTANA-logo-black.png" alt="VNTANA" height="18"></a>
    <nav class="demo-nav">
      <a href="index.html" class="demo-nav-home">← Use Cases</a>
      <a href="home.html">Home Explorer (client)</a>
      <a href="#" class="active">Translation Test</a>
    </nav>
  </header>

  <div class="internal-banner" style="justify-content:center; font-size:0.7rem; letter-spacing:0.04em;">
    Paste translated JSON below and switch languages to preview how hotspot text will appear in the viewer
  </div>

  <main class="page-wrap">

    <!-- LEFT: viewer -->
    <div class="viewer-col">
      <div class="viewer-wrap">
        <script type="module" src="https://cdn.jsdelivr.net/npm/@vntana/viewer/dist/bundle.js"></script>
        <vntana-viewer id="viewer" loading="eager" role="application" aria-label="Hexion Building Materials 3D viewer">
          <vntana-fs-button></vntana-fs-button>
          <vntana-center-button></vntana-center-button>
          <div class="button-container zoom-buttons">
            <vntana-zoom-in-button></vntana-zoom-in-button>
            <vntana-zoom-out-button></vntana-zoom-out-button>
          </div>
        </vntana-viewer>
      </div>
    </div>

    <!-- RIGHT: panel -->
    <div class="panel">

      <!-- Language picker -->
      <div class="panel-section">
        <div class="section-label">Language</div>
        <div class="lang-row" id="lang-row">
          <!-- populated by JS -->
        </div>
      </div>

      <!-- Hotspot cards -->
      <div class="hotspot-scroll" id="hs-scroll">
        <div style="color:var(--muted);font-size:0.82rem;">Loading hotspots…</div>
      </div>

      <!-- JSON editor (collapsible) -->
      <div class="json-panel">
        <div class="json-panel-head" id="json-toggle">
          <span class="json-toggle-label">Paste Translations JSON</span>
          <span class="json-toggle-icon" id="json-icon">▼</span>
        </div>
        <div class="json-body" id="json-body">
          <textarea class="json-area" id="json-area" spellcheck="false" placeholder='Paste JSON here, e.g.:
{
  "fr": {
    "11464f65-...": {
      "title": "Solutions pour matériaux",
      "description": "..."
    }
  }
}'></textarea>
          <div class="json-actions">
            <button class="json-btn" id="json-export-btn">Export current</button>
            <button class="json-btn primary" id="json-apply-btn">Apply JSON</button>
          </div>
          <div class="json-status" id="json-status"></div>
        </div>
      </div>

    </div>
  </main>

  <script type="module">
    const ORG      = "DCicero";
    const WS       = "figurement";
    const UUID     = "e5a84eb7-eaf2-44e6-82ed-6c10c9741e02";
    const BASE_URL = "https://api.vntana.com";
    const GLB_BLOB = "99113ed0-e3b8-4316-be6c-6a5477d12d2f.glb";

    // ── Built-in English source text ──────────────────────────────────────────
    const EN_SOURCE = {
      "9f6157ae-10a6-4c25-aa25-df2885ebbcae": {
        title: "Selectable Joystick Controls",
        description: "Low-effort hand control of all machine work group functions and the ability to switch between ISO and H control patterns.",
        category: "Controls"
      },
      "6d4f81d9-47d9-4e38-857a-1e8fee34de7b": {
        title: "Integrated In-Machine Cooling System",
        description: "A high-capacity radiator, large reversible fan and oil cooler keeps your loader running longer at lower temperatures. Run high and super-flow attachments efficiently without overheating.",
        category: "Cooling"
      },
      "6fac5a12-01ee-44df-92ed-9d37e91f4df2": {
        title: "Super Flow Hydraulics",
        description: "This auxiliary hydraulic option tackles the most demanding jobs with attachments that require the highest flow possible at 42 gpm and 4,061 psi.",
        category: "Hydraulics"
      },
      "02bdfbd9-fc81-40bb-84c0-bdb27ac6f683": {
        title: "Jobsite Companion",
        description: "Optional voice-activated machine functions, attachment-specific settings and real-time job insights help operators work faster without stopping the machine.",
        category: "Technology"
      },
      "2fba9efa-159a-437e-a5de-95ab86d0f22e": {
        title: "360° People Detection",
        description: "Option that detects people around the machine and helps give operators added awareness in busy jobsite conditions.",
        category: "Safety"
      }
    };

    // ── Translation store: { locale: { uuid: { title, description } } } ──────
    // "en" always falls back to EN_SOURCE above.
    const translations = { en: {} };

    const LANGS = [
      { code: "en", label: "EN — English" },
      { code: "fr", label: "FR — French" },
      { code: "es", label: "ES — Spanish" },
      { code: "de", label: "DE — German" },
    ];

    let activeLang = "en";
    let hotspotEls = [];
    let apiHotspots = [];

    // ── Resolve text for a uuid in the active language ────────────────────────
    function getText(uuid) {
      const localeData = translations[activeLang]?.[uuid];
      const enData = EN_SOURCE[uuid] ?? {};
      return {
        title:       localeData?.title       ?? enData.title       ?? `Hotspot`,
        description: localeData?.description ?? enData.description ?? "",
        category:    enData.category ?? "",
        isMissing:   activeLang !== "en" && !localeData
      };
    }

    // ── Check if a locale has any translations at all ─────────────────────────
    function hasTranslations(lang) {
      if (lang === "en") return true;
      return Object.keys(translations[lang] ?? {}).length > 0;
    }

    // ── Rebuild hotspot popup HTML ────────────────────────────────────────────
    function refreshHotspots() {
      hotspotEls.forEach((el, i) => {
        const hs   = apiHotspots[i];
        const uuid = hs.uuid;
        const { title, description } = getText(uuid);
        const imgUrl = hs.blobId
          ? `${BASE_URL}/hotspots/images/products/${UUID}/organizations/${ORG}/clients/${WS}/${hs.blobId}`
          : null;

        el.innerHTML = `
          <span class="hotspot-pin">${i + 1}</span>
          <div class="hotspot-popup">
            <button class="hotspot-close" aria-label="Close">✕</button>
            ${imgUrl ? `<img src="${imgUrl}" alt="" onerror="this.style.display='none'">` : ""}
            <div class="hotspot-text">
              <strong>${title}</strong>
              <p style="font-size:0.75rem;color:#555;margin-top:0.3rem;line-height:1.4">${description}</p>
            </div>
          </div>`;

        el.querySelector(".hotspot-close").addEventListener("click", closeAll);
      });
      buildCards();
    }

    // ── Rebuild right-panel cards ─────────────────────────────────────────────
    function buildCards() {
      const scroll = document.getElementById("hs-scroll");
      scroll.innerHTML = "";
      apiHotspots.forEach((hs, i) => {
        const uuid = hs.uuid;
        const { title, description, category, isMissing } = getText(uuid);
        const imgUrl = hs.blobId
          ? `${BASE_URL}/hotspots/images/products/${UUID}/organizations/${ORG}/clients/${WS}/${hs.blobId}`
          : null;

        const card = document.createElement("div");
        card.className = "hs-card";
        card.dataset.index = i;
        card.innerHTML = `
          <div class="hs-num">${i + 1}</div>
          ${imgUrl ? `<img class="hs-card-img" src="${imgUrl}" alt="">` : ""}
          <div class="hs-text">
            <strong>${title}</strong>
            ${isMissing
              ? `<div class="hs-missing">No ${activeLang.toUpperCase()} translation — showing English</div>`
              : `<div class="hs-desc">${description}</div>`}
            <div style="font-size:0.68rem;color:#9ca3af;margin-top:0.25rem">${uuid.slice(0,8)}…</div>
          </div>`;

        card.addEventListener("click", () => {
          const el = hotspotEls[i];
          const isOpen = el?.classList.contains("open");
          closeAll();
          if (!isOpen && el) {
            el.classList.add("open");
            snapCamera(el._camera);
            document.querySelectorAll(".hs-card").forEach((c, ci) =>
              c.classList.toggle("active", ci === i));
          }
        });
        scroll.appendChild(card);
      });
    }

    // ── Rebuild language buttons ──────────────────────────────────────────────
    function buildLangRow() {
      const row = document.getElementById("lang-row");
      row.innerHTML = "";
      LANGS.forEach(({ code, label }) => {
        const btn = document.createElement("button");
        btn.className = "lang-btn" + (code === activeLang ? " active" : "") +
                        (!hasTranslations(code) && code !== "en" ? " missing" : "");
        btn.textContent = label;
        btn.title = hasTranslations(code) || code === "en"
          ? "" : "No translations loaded yet";
        btn.addEventListener("click", () => {
          activeLang = code;
          buildLangRow();
          refreshHotspots();
        });
        row.appendChild(btn);
      });
    }

    const viewer  = document.getElementById("viewer");
    const closeAll = () => viewer.querySelectorAll("vntana-hotspot.open")
      .forEach(h => h.classList.remove("open"));

    function snapCamera(cam) {
      if (!cam) return;
      try {
        if (cam.cameraRotation)   viewer.setCameraRotation(cam.cameraRotation);
        if (cam.cameraDistance)   viewer.setCameraDistance(cam.cameraDistance);
        if (cam.cameraTarget)     viewer.setCameraTarget(cam.cameraTarget);
        if (cam.fieldOfView)      viewer.setFieldOfView(cam.fieldOfView);
        if (cam.orthographicSize) viewer.setOrthographicSize(cam.orthographicSize);
      } catch(e) {}
    }

    // ── Hotspot position/camera data (hardcoded from platform API) ───────────
    const HS_DATA = [
      {
        uuid: "9f6157ae-10a6-4c25-aa25-df2885ebbcae",
        position: "0.6293085111936879m 0.43696063921572464m -0.2652820648198517m",
        normal:   "0.9534805882305541m 0.2026907327422m -0.22313949611833983m",
        camera:   {"cameraTarget":"0r 0r 0r","cameraDistance":"2.176439668708029r","cameraRotation":"-0.14564675336358035rad 1.612555778307147rad 0rad","fieldOfView":"0.3959050905669924rad","orthographicSize":"0.4365488093301792r"}
      },
      {
        uuid: "6d4f81d9-47d9-4e38-857a-1e8fee34de7b",
        position: "-1.9041365108138133m 0.44405335513587674m -0.0001405699781816816m",
        normal:   "-0.6439437284608202m 0.7564976774696907m -0.11422669810049478m",
        camera:   {"cameraTarget":"0r 0r 0r","cameraDistance":"2.176439668708029r","cameraRotation":"-0.1371854325845434rad 4.7279828232984835rad 0rad","fieldOfView":"0.3959050905669924rad","orthographicSize":"0.4365488093301792r"}
      },
      {
        uuid: "6fac5a12-01ee-44df-92ed-9d37e91f4df2",
        position: "0.8737988328879692m 0.13335461258380268m -0.5814802740992924m",
        normal:   "0.9800712980953769m 0.1986457572183087m 0.000337325966709584m",
        camera:   {"cameraTarget":"0r 0r 0r","cameraDistance":"2.08842710011709r","cameraRotation":"-0.07838609257501661rad 1.7116294419323723rad 0rad","fieldOfView":"0.3530664253343655rad","orthographicSize":"0.37255490714388967r"}
      },
      {
        uuid: "02bdfbd9-fc81-40bb-84c0-bdb27ac6f683",
        position: "0.5269581495003125m 0.943177023063472m -0.2418768787444152m",
        normal:   "0.9569177017571057m 0.20333107067881231m -0.20727997433545478m",
        camera:   {"cameraTarget":"0r 0r 0r","cameraDistance":"2.2224770122786746r","cameraRotation":"-0.2679157697941619rad 1.4444041263357328rad 0rad","fieldOfView":"0.42003839582158237rad","orthographicSize":"0.47374878842449397r"}
      },
      {
        uuid: "2fba9efa-159a-437e-a5de-95ab86d0f22e",
        position: "0.6562082640148114m 1.1693785518387276m 0.21590587985227083m",
        normal:   "0.3917762395849866m 0.8808936098696819m 0.2655895822268038m",
        camera:   {"cameraTarget":"0r 0r 0r","cameraDistance":"2.4634960462661715r","cameraRotation":"-0.4440206724747404rad 1.5471124450762037rad 0rad","fieldOfView":"0.5672207574255906rad","orthographicSize":"0.7180285830464684r"}
      }
    ];

    // ── Build cards immediately from EN_SOURCE (don't wait for viewer) ────────
    apiHotspots = HS_DATA;
    buildLangRow();
    buildCards();

    // ── Load viewer ───────────────────────────────────────────────────────────
    const product = await fetch(`${BASE_URL}/products/${UUID}/organizations/${ORG}/clients/${WS}`).then(r => r.json());
    const config  = JSON.parse(product.response.viewerSettings.config);
    Object.assign(viewer, config);
    viewer.src = `${BASE_URL}/assets/products/${UUID}/organizations/${ORG}/clients/${WS}/${GLB_BLOB}`;

    // ── Inject hotspot pins after model loads ─────────────────────────────────
    viewer.addEventListener("load", () => {
      hotspotEls = HS_DATA.map((hs, idx) => {
        const el = document.createElement("vntana-hotspot");
        el.position = hs.position;
        el.normal   = hs.normal;
        el._camera  = hs.camera;
        viewer.appendChild(el);

        el.addEventListener("click", e => {
          if (e.target.closest(".hotspot-popup")) return;
          const isOpen = el.classList.contains("open");
          closeAll();
          if (!isOpen) {
            el.classList.add("open");
            snapCamera(hs.camera);
            document.querySelectorAll(".hs-card").forEach((c, ci) =>
              c.classList.toggle("active", ci === idx));
          }
        });
        return el;
      });
      refreshHotspots(); // re-render popups now that els exist
    }, { once: true });

    // ── JSON editor ───────────────────────────────────────────────────────────
    const jsonToggle = document.getElementById("json-toggle");
    const jsonIcon   = document.getElementById("json-icon");
    const jsonBody   = document.getElementById("json-body");
    const jsonArea   = document.getElementById("json-area");
    const jsonStatus = document.getElementById("json-status");

    jsonToggle.addEventListener("click", () => {
      const open = jsonBody.classList.toggle("open");
      jsonIcon.classList.toggle("open", open);
    });

    document.getElementById("json-apply-btn").addEventListener("click", () => {
      jsonStatus.className = "json-status";
      jsonStatus.textContent = "";
      try {
        const parsed = JSON.parse(jsonArea.value);
        // Merge into translations store
        for (const [lang, data] of Object.entries(parsed)) {
          translations[lang] = { ...(translations[lang] ?? {}), ...data };
        }
        // Add any new languages to LANGS if not already there
        for (const lang of Object.keys(parsed)) {
          if (!LANGS.find(l => l.code === lang)) {
            LANGS.push({ code: lang, label: lang.toUpperCase() });
          }
        }
        buildLangRow();
        refreshHotspots();
        const count = Object.values(parsed).reduce((n, d) => n + Object.keys(d).length, 0);
        jsonStatus.className = "json-status ok";
        jsonStatus.textContent = `Applied — ${count} hotspot translation(s) loaded.`;
      } catch(e) {
        jsonStatus.className = "json-status err";
        jsonStatus.textContent = "Invalid JSON: " + e.message;
      }
    });

    document.getElementById("json-export-btn").addEventListener("click", () => {
      // Export current non-English translations as JSON to copy
      const out = {};
      for (const [lang, data] of Object.entries(translations)) {
        if (lang === "en") continue;
        if (Object.keys(data).length) out[lang] = data;
      }
      jsonArea.value = JSON.stringify(out, null, 2);
      jsonBody.classList.add("open");
      jsonIcon.classList.add("open");
      jsonStatus.className = "json-status ok";
      jsonStatus.textContent = "Current translations exported to editor.";
    });
  </script>

</body>
</html>
