<head>

  <title>UVBC Replacement Parts | Roeslein</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --ro-navy:  #1a2a3a;
      --ro-red:   #c8102e;
      --ro-light: #f4f7fa;
      --header-h: 52px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--ro-light); }

    /* ── Header ── */
    header { background: var(--ro-navy); border-bottom: none; }
    header .logo img { filter: none; }

    /* ── Layout ── */
    main.parts-layout {
      display: grid;
      grid-template-columns: 1fr 460px;
      min-height: calc(100vh - var(--header-h));
    }

    /* ── Viewer column ── */
    .viewer-col {
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      background: radial-gradient(ellipse at 50% 60%, #2a3f54 0%, #111c26 100%);
      display: flex;
      flex-direction: column;
    }
    .viewer-col vntana-viewer {
      flex: 1;
      display: block;
      width: 100%;
      height: 100%;
      --vntana-viewer-background-color: transparent;
    }
    .viewer-hint {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.55);
      color: rgba(255,255,255,.7);
      font-size: .72rem;
      padding: .35rem .85rem;
      border-radius: 20px;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Parts panel ── */
    .parts-col {
      background: #fff;
      border-left: 1px solid #e2e2e0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      height: calc(100vh - var(--header-h));
      position: sticky;
      top: var(--header-h);
    }

    /* default / idle state */
    .pdp-default {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2.5rem 2rem; text-align: center; color: #bbb;
      gap: 1rem;
    }
    .pdp-default svg { opacity: .35; }
    .pdp-default h2 { font-size: 1rem; font-weight: 700; color: #444; }
    .pdp-default p  { font-size: .82rem; color: #999; line-height: 1.6; max-width: 260px; }

    /* active PDP */
    .pdp-active { display: none; flex-direction: column; flex: 1; }
    .pdp-active.visible { display: flex; }

    .pdp-asm-header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid #e8e8e6;
    }
    .pdp-asm-header .kicker {
      font-size: .6rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--ro-red); margin-bottom: .35rem;
    }
    .pdp-asm-header h2 {
      font-size: 1.15rem; font-weight: 800; letter-spacing: -.02em; color: #111;
      margin-bottom: .3rem;
    }
    .pdp-asm-header p {
      font-size: .78rem; color: #777; line-height: 1.5;
    }
    .pdp-back {
      font-size: .72rem; font-weight: 600; color: #999;
      cursor: pointer; margin-bottom: .75rem;
      display: inline-flex; align-items: center; gap: .3rem;
    }
    .pdp-back:hover { color: var(--ro-navy); }

    /* parts list inside PDP */
    .pdp-parts { padding: 1rem 1.25rem 1.5rem; flex: 1; overflow-y: auto; }

    .part-card {
      border: 1.5px solid #e8e8e6;
      border-radius: 10px;
      padding: 1rem 1.1rem;
      margin-bottom: .75rem;
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
    }
    .part-card:hover { border-color: var(--ro-navy); box-shadow: 0 2px 10px rgba(0,0,0,.06); }

    .part-sku {
      font-size: .6rem; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; color: #aaa; margin-bottom: .2rem;
    }
    .part-name {
      font-size: .9rem; font-weight: 700; color: #111; line-height: 1.3;
      margin-bottom: .35rem;
    }
    .part-desc {
      font-size: .75rem; color: #666; line-height: 1.55; margin-bottom: .75rem;
    }
    .part-footer {
      display: flex; align-items: center; justify-content: space-between; gap: .5rem;
    }
    .part-price {
      font-size: 1rem; font-weight: 800; color: var(--ro-navy);
    }
    .part-price.no-price {
      font-size: .78rem; font-weight: 600; color: #999;
    }
    .btn-cart {
      font-size: .75rem; font-weight: 700;
      background: var(--ro-red); color: #fff;
      border: none; border-radius: 7px;
      padding: .5rem 1.1rem; cursor: pointer;
      white-space: nowrap; text-decoration: none;
      display: inline-block; transition: background .15s;
    }
    .btn-cart:hover { background: #a50d26; }

    @media (max-width: 860px) {
      main.parts-layout { grid-template-columns: 1fr; }
      .viewer-col { height: 55vw; position: relative; top: 0; }
      .parts-col { height: auto; position: static; overflow-y: visible; }
    }
  </style>

    function showAssembly(asmKey) {
      // resolve to a primary filter key (disc_blower → electrical, etc.)
      const filterKey = ASM_TO_FILTER[asmKey] || asmKey;
      // prefer specific meta, fall back to filter meta
      const meta = ASM_META[asmKey] || ASM_META[filterKey] || { label: asmKey, desc: "" };

      document.getElementById("pdp-title").textContent = meta.label;
      document.getElementById("pdp-desc").textContent  = meta.desc;

      const parts = PARTS.filter(p => p.filter.includes(filterKey) || p.filter.includes(asmKey));
      const container = document.getElementById("pdp-parts");

      if (!parts.length) {
        container.innerHTML = `<p style="color:#aaa;font-size:.82rem;padding:1rem 0">No parts mapped to this assembly yet.</p>`;
      } else {
        container.innerHTML = parts.map(p => {
          const price = PRICES[p.sku];
          const priceHtml = price && price !== "$0.00"
            ? `<span class="part-price">${price}</span>`
            : `<span class="part-price no-price">Contact for pricing</span>`;
          return `<div class="part-card">
            <div class="part-sku">SKU ${p.sku}</div>
            <div class="part-name">${p.name}</div>
            <div class="part-desc">${p.desc}</div>
            <div class="part-footer">
              ${priceHtml}
              <a href="https://parts.roeslein.com/d-i-canmaking-parts/roeslein-associates/uvbc/" target="_blank" rel="noopener" class="btn-cart">Order Part</a>
            </div>
          </div>`;
        }).join("");
      }

      pdpDefault.style.display = "none";
      pdpActive.classList.add("visible");
      pdpActive.scrollTop = 0;
    }

    document.getElementById("pdp-back").addEventListener("click", () => {
      pdpActive.classList.remove("visible");
      pdpDefault.style.display = "";
    });

    // ── Viewer init ────────────────────────────────────────────
    const viewer = document.getElementById("viewer");

    const BASE_URL  = "https://api.vntana.com";
    const UUID      = "657f3fe0-1188-4988-8d02-122750504c86";
    const ORG       = "DCicero";
    const WORKSPACE = "n8n-work";

    const NODE_MAP = {
      "VTU RH 36in Single Lamp":                                         "vtu",
      "RP001-092-15-2009":                                               "lamp",
      "RP001-092-04-1003":                                               "coating",
      "36 RH DD Bottom Coater":                                          "coating",
      "116-423 SQAF270-4-CWUB-160_2":                                   "blower",
      "AB 194E-FA Electrical Disconnect_DS-MA001 - Vacuum Blower":       "disc_blower",
      "AB 194E-FA16 Electrical Disconnect_DS-MA003 - Vacuum Conveyor":   "disc_conveyor",
      "AB 194E-FA16 Electrical Disconnect_DS-MA005 - Applicator Roller": "disc_applicator",
      "AB 194E-FA16 Electrical Disconnect_DS-MA006 - Day Tank Mixer":    "disc_daytank",
      "AB 194E-FA16 Electrical Disconnect_DS-MA015 - Lacquer Pump":      "disc_lacquer",
      "ESPB01 - 8017.685 Estop Pushbutton Station":                      "estop",
      "AB 440N-Z21SS2H, Guard Switch, Base_GS-01 - Lamp Front":         "guard",
      "AB 440N-Z21SS2H, Guard Switch, Base_GS-02 - Roller Front":       "guard",
      "AB 440N-Z21SS2H, Guard Switch, Base_GS-03 - Lamp Rear":          "guard",
      "AB 440N-Z21SS2H, Guard Switch, Base_GS-04 - Can Entrance":       "guard",
      "AB 44N-Z21SS2H, Guard Switch, Actuator":                         "guard",
      "SICK WL9-3P2432 Photoelectric Sensor with BEF-WN-W9-2 B_74579a9": "sensor",
      "SICK WL9-3P2432 Photoelectric Sensor with BEF-WN-W9-2 B_5b5eeeb": "sensor",
      "SICK WL9-3P2432 Photoelectric Sensor with BEF-WN-W9-2 B_53d1321": "sensor",
      "SICK WL9-3P2432 Photoelectric Sensor with BEF-WN-W9-2 B_d283af2": "sensor",
      "SICK PL80A Photoelectric Sensor Reflector":                       "sensor",
      "SICK WL9-3P2432 Photoelectric Sensor":                           "sensor",
      "UVBC03 - 8017.545, Machine Mounted Junction Box":                 "jbox",
      "Chiller, Pfannenberg EB95WT":                                    "chiller",
    };

    // Map 3D assembly key → panel filter key
    const ASM_TO_FILTER = {
      vtu: "vtu", lamp: "lamp", coating: "coating", blower: "blower",
      disc_blower: "electrical", disc_conveyor: "electrical",
      disc_applicator: "electrical", disc_daytank: "electrical", disc_lacquer: "electrical",
      estop: "safety", guard: "safety", sensor: "safety", jbox: "electrical",
      chiller: "chiller",
    };

    const normalize = t => t?.replace(/\s*\(\d+\)\s*$/, "").replace(/\.\d{3}$/, "").trim() ?? "";

    // ── Viewer selection → show assembly PDP ──────────────────
    const handleSelection = (node) => {
      let n = node;
      while (n) {
        const key = NODE_MAP[normalize(n.name ?? "")];
        if (key) { showAssembly(key); return; }
        n = n.parent;
      }
    };

    // ── Selection detection (same pattern as parts.js) ────────────
    // highlight "change" fires on viewport click; value 0 = selected.
    const attachSelectionListener = () => {
      if (!viewer.selection?.highlight?.addEventListener) return false;
      viewer.selection.highlight.addEventListener("change", (event) => {
        event.changes.forEach((value, node) => {
          if (value !== 0) return; // 0 = selected, skip deselect events
          handleSelection(node);
        });
      });
      return true;
    };

    if (!attachSelectionListener()) {
      viewer.addEventListener("load", attachSelectionListener, { once: true });
    }

    // ── Load product ───────────────────────────────────────────
    (async () => {
      try {
        const product = await fetch(
          `${BASE_URL}/products/${UUID}/organizations/${ORG}/clients/${WORKSPACE}`
        ).then(r => r.json());
        const { asset, viewerSettings } = product.response;
        const blobId = asset.models[0].modelBlobId;
        if (viewerSettings?.config) Object.assign(viewer, JSON.parse(viewerSettings.config));
        viewer.enableAutoRotate = false;
        viewer.src = `${BASE_URL}/assets/products/${UUID}/organizations/${ORG}/clients/${WORKSPACE}/${blobId}`;
        attachSelectionListener();
      } catch (e) { console.error("Viewer init failed:", e); }
    })();

  </script>

</body>
</html>
