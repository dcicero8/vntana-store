<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VNTANA Store — Shop in 3D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <a href="index.html" class="logo">VNTANA<span>STORE</span></a>
    <nav>
      <a href="#">New Arrivals</a>
      <a href="#">Furniture</a>
      <a href="#">Baby</a>
      <a href="#">Industrial</a>
    </nav>
    <div class="header-actions">
      <a href="#">Cart (0)</a>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <p class="hero-eyebrow">Every product in 3D</p>
      <h1>See it. Rotate it.<br>Place it. Buy it.</h1>
      <p class="hero-sub">Interactive 3D and AR on every product page — no app required.</p>
    </div>
  </section>

  <section class="catalog">
    <div class="catalog-header">
      <h2>Featured Products</h2>
    </div>
    <div class="product-grid" id="product-grid">
      <!-- injected by catalog.js -->
    </div>
  </section>

  <script type="module" src="catalog.js"></script>
</body>
</html>
